<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POO con Canvas</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Tu CSS -->
  <link rel="stylesheet" href="./assets/css/styles.css">
  <link rel="shortcut icon" href="assets/img/favicon.png" type="image/x-icon">
</head>

<body>

  <!-- 🔷 NAVBAR -->
  <nav class="navbar navbar-expand-lg glass">
    <div class="container">
      <a class="navbar-brand text-white" href="#">POO Canvas</a>
    </div>
  </nav>

  <!-- 🔧 CONTROLES -->
  <div class="container mt-4">
    <div class="row g-3 glass p-3">

      <div class="col-md-3">
        <label class="form-label text-white">Cantidad</label>
        <input type="number" id="numCircles" class="form-control" value="5" min="1" max="100">
      </div>

      <div class="col-md-3">
        <label class="form-label text-white">Ancho</label>
        <input type="number" id="canvasWidth" class="form-control" value="800">
      </div>

      <div class="col-md-3">
        <label class="form-label text-white">Alto</label>
        <input type="number" id="canvasHeight" class="form-control" value="500">
      </div>

      <div class="col-md-3 d-flex align-items-end">
        <button id="generateBtn" class="btn btn-primary w-100">
          Aplicar cambios
        </button>
      </div>

    </div>
  </div>

  <!-- 🎯 CANVAS -->
  <div class="d-flex justify-content-center mt-4">
    <canvas id="canvas"></canvas>
  </div>

  <!-- 🔻 FOOTER -->
  <footer class="mt-5 glass text-center text-white p-3">
    <p>Desarrollado por: Ing Yael</p>
    <p>POO con JavaScript y Canvas</p>
  </footer>

  <!-- Script -->
  <script src="./assets/js/main.js"></script>

</body>
</html>
